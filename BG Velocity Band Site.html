<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BG Barry Golden and the Velocity Band</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body {
      margin: 0; padding: 0;
      background: #1A0A2E;
      min-height: 100%;
    }
    #root { min-height: 100vh; }
    .bg-page { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="pages/home.jsx"></script>
  <script type="text/babel" src="pages/bio.jsx"></script>
  <script type="text/babel" src="pages/presskit.jsx"></script>
  <script type="text/babel" src="pages/booking.jsx"></script>
  <script type="text/babel" src="pages/contact.jsx"></script>
  <script type="text/babel" src="pages/media.jsx"></script>
  <script type="text/babel" src="extras.jsx"></script>
  <script type="text/babel" src="effects.jsx"></script>
  <script type="text/babel" src="tweaks.jsx"></script>

  <script type="text/babel" data-presets="react">
    const PAGES = {
      home:    () => <HomePage />,
      bio:     () => <BioPage />,
      press:   () => <PressKitPage />,
      booking: () => <BookingPage />,
      contact: () => <ContactPage />,
      media:   () => <MediaPage />,
    };

    function App() {
      return (
        <RouterProvider>
          <PageRenderer />
        </RouterProvider>
      );
    }

    function PageRenderer() {
      const { page } = useRouter();
      const render = PAGES[page] || PAGES.home;
      return (
        <>
          {render()}
          <SiteEffects />
          <SiteTweaks />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
